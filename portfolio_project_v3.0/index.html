<!-- Improved UI with styled project cards and better layout while keeping features working -->

<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VYM Portfolio</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 text-gray-800">

<!-- Progress Bar -->

<div id="progress" class="fixed top-0 left-0 h-1 bg-gradient-to-r from-blue-500 to-purple-500 w-0 z-50"></div>

<!-- NAV -->

<nav class="flex justify-between items-center px-8 py-4 bg-white shadow fixed w-full top-0 z-40">
  <h1 class="text-xl font-bold tracking-wide">VYM</h1>

  <div class="flex gap-8 font-medium">
    <a href="#home" class="nav-link hover:text-blue-500">Home</a>
    <a href="#projects" class="nav-link hover:text-blue-500">Projects</a>
    <a href="#skills" class="nav-link hover:text-blue-500">Skills</a>
  </div>

<button id="themeBtn" class="text-lg">🌙</button>

</nav>

<!-- HERO -->

<section id="home" class="min-h-screen flex flex-col justify-center items-center text-center pt-20">
  <img src="image\myphoto.jpg.jpeg" class="h-50 rounded-sm">
  <h1 class="text-5xl font-bold mb-4">Varshith YM</h1>
  <p id="typing" class="text-lg text-gray-600 mb-2 h-6 w-[220px] mx-auto text-center"></p>
  <p id="greet" class="text-sm mb-1"></p>
  <p id="geo" class="text-xs text-gray-500"></p>
</section>

<!-- PROJECTS -->

<section id="projects" class="py-20 px-6">

  <h2 class="text-4xl text-center font-bold mb-8">Projects</h2>

  <!-- SEARCH -->

<input id="search"
 class="block mx-auto border px-5 py-3 rounded-xl w-full max-w-md mb-6 shadow-sm"
 placeholder="Search projects...">

  <!-- FILTER -->

  <div id="filters" class="flex justify-center gap-4 mb-6"></div>

  <!-- SORT -->

  <div class="text-center mb-6">
    <select id="sort" class="border px-4 py-2 rounded-lg shadow-sm">
      <option value="">Sort</option>
      <option value="name">Name</option>
      <option value="status">Status</option>
    </select>
  </div>

  <!-- COUNT -->

  <p id="count" class="text-center mb-8 font-semibold text-gray-600"></p>

  <!-- PROJECT CARDS -->

  <div id="projectsBox" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

</section>

<!-- RECENT -->

<section class="py-16 bg-gray-100 text-center">
  <h3 class="text-2xl font-semibold mb-6">Recently Viewed</h3>
  <div id="recent" class="flex flex-wrap justify-center gap-4"></div>
</section>

<!-- SKILLS -->

<section id="skills" class="py-20 px-6">

  <h2 class="text-4xl text-center font-bold mb-10">Skills</h2>

  <div id="skillsBox" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

</section>

<!-- CONTACT -->

<section class="py-20 text-center">

  <h2 class="text-2xl mb-6 font-semibold">Contact</h2>

  <div class="flex flex-col gap-4 max-w-md mx-auto">
    <input id="nameInput" class="border px-4 py-3 rounded-lg shadow-sm" placeholder="Your Name">
    <input id="emailInput" class="border px-4 py-3 rounded-lg shadow-sm" placeholder="Your Email">
  </div>

</section>

<!-- BACK TO TOP -->

<button id="topBtn"
class="fixed bottom-6 right-6 bg-black text-white px-4 py-2 rounded-full shadow-lg hover:scale-110 transition">
↑ </button>

<!-- DATA + RENDER -->

<script>
const projects = [
  {id:1,name:"Movie Time",type:"Frontend",status:"Live",desc:"Full stack movie booking system"},
  {id:2,name:"Cab Booking",type:"Backend",status:"Demo",desc:"Ride booking application"},
  {id:3,name:"Portfolio",type:"Frontend",status:"Live",desc:"Personal portfolio website"},
  {id:4,name:"Dashboard",type:"Frontend",status:"Demo",desc:"Developer stats dashboard"}
];

const skills = [
  {name:"React"},
  {name:"JavaScript"},
  {name:"MongoDB"},
  {name:"Tailwind"}
];

function renderProjects(arr){
  const box=document.getElementById("projectsBox");
  box.innerHTML="";

  document.getElementById("count").textContent=arr.length+" projects found";

  arr.forEach(p=>{
    const div=document.createElement("div");

    div.className="bg-white p-6 rounded-2xl shadow-md hover:shadow-xl transition transform hover:-translate-y-2";

    div.innerHTML=`
      <div class="flex justify-between items-center mb-3">
        <h3 class="font-bold text-lg">${p.name}</h3>
        <span class="text-xs px-2 py-1 rounded ${
          p.status==="Live" ? "bg-green-200 text-green-700" : "bg-yellow-200 text-yellow-700"
        }">${p.status}</span>
      </div>

      <p class="text-sm text-gray-600 mb-3">${p.desc}</p>

      <div class="flex justify-between items-center text-xs">
        <span class="text-blue-500">${p.type}</span>
        <button class="text-blue-600 hover:underline">View</button>
      </div>
    `;

    div.onclick=()=>saveRecent(p);

    box.appendChild(div);
  });
}

function renderSkills(){
  const box=document.getElementById("skillsBox");
  box.innerHTML="";

  skills.forEach(s=>{
    const d=document.createElement("div");

    d.className="bg-white p-5 rounded-xl shadow hover:shadow-lg text-center font-medium";

    d.textContent=s.name;

    box.appendChild(d);
  });
}

renderProjects(projects);
renderSkills();
</script>

<!-- FEATURES -->

<script src="js/scroll.js"></script>

<script src="js/scrollSpy.js"></script>

<script src="js/backToTop.js"></script>

<script src="js/search.js"></script>

<script src="js/count.js"></script>

<script src="js/filter.js"></script>

<script src="js/sort.js"></script>

<script src="js/toggleDesc.js"></script>

<script src="js/typing.js"></script>

<script src="js/skills.js"></script>

<script src="js/formSave.js"></script>

<script src="js/recent.js"></script>

<script src="js/theme.js"></script>

<script src="js/greeting.js"></script>

<script src="js/geolocation.js"></script>

<script src="js/main.js"></script>

</body>
</html>
