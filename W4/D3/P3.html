<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving and reading and deleting in Session storage</title>
</head>
<body>
    <input type="text" id="themeinput" placeholder="Enter theme e.g:light or Dark">
    <p id="output"></p>
    <button id="savebtn">Save to session Storage</button>
    <button id="readbtn">Read from session Storage</button>
    <button id="removebtn">Read a key from session Storage</button>
    <button id="clearbtn">Clear all session Storage</button>
    <script src="./P3.js"></script>
</body>
</html>
