        <section class="border rounded space-y-6">
            <div class="overflow-hidden rounded border p-6">
                <div id="track" class="flex transition-transform duration-300 ease-out">
                    <div class="w-full shrink-0 h-52 snap-start flex items-center justify-center bg-red-100 font-bold">
                        slide1
                    </div>
                    <div class="w-full shrink-0 h-52 snap-start flex items-center justify-center bg-red-100 font-bold">
                        slide2
                    </div>
                    <div class="w-full shrink-0 h-52 snap-start flex items-center justify-center bg-red-100 font-bold">
                        slide3
                    </div>
                    
                </div>
                <div class="flex justify-center gap-2 items-center">
                <button id="prev" class="px-3 py-2 rounded border hover:bg-blue-100 transition">prev</button>
                <button id="next" class="px-3 py-2 rounded border hover:bg-blue-100 transition">next</button>
            </div>
            </div>
            
        </section>
    </main>
    <script>
        const track = document.getElementById('track');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        let index = 0;
        const total = 3;
        function update() {
            track.style.transform = `translateX(-${index*100}%)`;
        }
        prevBtn.addEventListener('click',()=>{
            index = (index + 1 + total)%total; update();
        });
        update();
    </script>
