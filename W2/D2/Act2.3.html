<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="bg-blue-900 min-h-screen">
            <span class=" border-2 border-l-red-900 fixed bottom-135 left-0 w-225 p-2 z-50 ml-85 border-l-4 border-l-red-900 shadow-xl[0_20px_40px_rgba(255,0,0,1)]">schedule maintenance tonight may effect dashboard</span>
        <div class=" bg-red-200 flex justify-center  min-h-screen gap-10 pt-12 shadow-xl bg-white rounded-2xl">
            <div class="p-5">
                <h4 class="p-2">Active users</h4>
                <h1 class="p-2">12840</h1>
                <h3 class="rounded-2xl h-12 w-16 border text-center flex justify-center bg-green-200 text-green-900 ring-4">up</h3>
            </div>
            <div class="p-5">
                <h4 class="p-2">Request-min</h4>
                <h1 class="p-2">1240</h1>
                <h3 class="rounded-2xl h-12 w-16 border text-center flex justify-center bg-blue-200 text-blue-900 ring-4">stable</h3>
            </div>
            <div class="p-5">
                <h4 class="p-2">Error Rate</h4>
                <h1 class="p-2">2.1</h1>
                <h3 class="rounded-2xl h-12 w-16 border text-center flex justify-center bg-amber-200 text-amber-900 ring-4">down</h3>
            </div>
            <div class="ml-50">
                <button class="bg-blue-900 rounded w-40 h-10 flex">Download Report</button>
            </div>
            
        </div>
    </div>
    

    
</body>
</html>
