<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Variables</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <pre id="out">

    </pre>    
    <button id="runbtn" class="px-3 py-1 rounded-lg m-2 border bg-gray-700 text-white">Run</button>
 
    <script>
        const out =document.getElementById("out");
        function print(...args){

            console.log(...args);
            out.textContent+=args.join("")+"\n";
        
        
        }
        function clearOut(){
            out.textContent ="";
        }
        function run(){
            clearOut();
            // Var 
        var a=20;
        var a=30;
        print("Var a=",a);
        // let
        let b=20;
        b=10;
        // let b=25; Creates error if enabled or uncommented
        print("value of let b=",b);
        //const
        const pi=3.1415;
        // pi=2.13;
        print("Const pi=",pi);
        }
        document.getElementById("runbtn").addEventListener("click",run);
        run();
    </script>
</body>
</html>
