<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving and reading and deleting in local storage</title>
</head>
<body>
    <input type="text" id="themeinput" placeholder="Enter theme e.g:light or Dark">
    <p id="output"></p>
    <button id="savebtn">Save to local Storage</button>
    <button id="readbtn">Read from local Storage</button>
    <button id="removebtn">Read a key from local Storage</button>
    <button id="clearbtn">Clear all local Storage</button>
    <script src="./P2.js"></script>
</body>
</html>
